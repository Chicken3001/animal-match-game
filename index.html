<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
  }

  body {
    font-family: 'Baloo 2', cursive;
    background: #fff9f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    gap: 0;
    background-image:
      radial-gradient(circle at 10% 20%, #FFE0B230 0%, transparent 45%),
      radial-gradient(circle at 90% 75%, #B2EBF230 0%, transparent 45%),
      radial-gradient(circle at 55% 50%, #F8BBD025 0%, transparent 55%);
  }

  /* Floating background decorations */
  .deco {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: floatDeco ease-in-out infinite;
    opacity: 0.13;
    font-size: 2rem;
  }
  @keyframes floatDeco {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-16px) rotate(8deg); }
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(18px, 4vw, 36px);
    padding: 20px;
    width: 100%;
    max-width: 520px;
  }

  .logo-area {
    text-align: center;
  }

  .logo-emoji {
    font-size: clamp(3.5rem, 10vw, 5.5rem);
    display: block;
    animation: logoBounce 2.5s ease-in-out infinite;
    line-height: 1;
  }
  @keyframes logoBounce {
    0%,100% { transform: translateY(0) rotate(-3deg) scale(1); }
    50%      { transform: translateY(-12px) rotate(3deg) scale(1.05); }
  }

  h1 {
    font-size: clamp(2.4rem, 7vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, #FF6B6B 0%, #FFB347 40%, #4ECDC4 70%, #A78BFA 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-top: 10px;
  }

  .tagline {
    font-size: clamp(1rem, 2.8vw, 1.35rem);
    color: #aaa;
    font-weight: 600;
    margin-top: 6px;
  }

  /* Category cards */
  .categories {
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 3vw, 22px);
    width: 100%;
  }

  .category-btn {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: clamp(16px, 3vw, 22px) clamp(20px, 4vw, 32px);
    border-radius: 28px;
    border: 3.5px solid transparent;
    background: white;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 6px 24px rgba(0,0,0,0.09);
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .category-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .category-btn:hover::before,
  .category-btn:active::before { opacity: 1; }

  .category-btn:hover  { transform: scale(1.03) translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.13); }
  .category-btn:active { transform: scale(0.97); }

  /* Wild animals — warm sunrise palette */
  .btn-wild {
    border-color: #FFB347;
    background: linear-gradient(135deg, #fff8f0, #fff3e0);
  }
  .btn-wild::before { background: linear-gradient(135deg, #FFE0B2, #FFF3E0); }
  .btn-wild .cat-arrow { color: #FF9800; }

  /* Farm animals — fresh green palette */
  .btn-farm {
    border-color: #81C784;
    background: linear-gradient(135deg, #f0fdf4, #e8f5e9);
  }
  .btn-farm::before { background: linear-gradient(135deg, #C8E6C9, #E8F5E9); }
  .btn-farm .cat-arrow { color: #43A047; }

  .cat-emoji-group {
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    line-height: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    flex-shrink: 0;
  }

  .cat-emoji-row {
    display: flex;
    gap: 4px;
  }

  .cat-text {
    flex: 1;
    text-align: left;
  }

  .cat-title {
    font-size: clamp(1.3rem, 3.5vw, 1.8rem);
    font-weight: 800;
    line-height: 1;
    color: #333;
  }

  .cat-sub {
    font-size: clamp(0.78rem, 2vw, 0.95rem);
    color: #999;
    font-weight: 600;
    margin-top: 3px;
  }

  .cat-arrow {
    font-size: 1.6rem;
    font-weight: 900;
    flex-shrink: 0;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
  }

  .category-btn:hover .cat-arrow { transform: translateX(5px); }

  /* Footer */
  .footer {
    font-size: 0.8rem;
    color: #ccc;
    font-weight: 600;
    text-align: center;
  }
</style>
</head>
