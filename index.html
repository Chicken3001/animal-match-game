<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Animal Match!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --card-size: 100px;
    --gap: 18px;
    --colors: #FF6B6B, #FFB347, #4ECDC4, #A78BFA, #34D399, #F472B6, #60A5FA, #FBBF24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    font-family: 'Baloo 2', cursive;
    background: var(--bg);
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(circle at 15% 15%, #FFE0B220 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, #B2EBF220 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, #F8BBD020 0%, transparent 60%);
  }

  header {
    padding: 18px 24px 8px;
    text-align: center;
    width: 100%;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, #FF6B6B, #FFB347, #4ECDC4, #A78BFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1;
  }

  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: #888;
    font-weight: 600;
    margin-top: 4px;
  }

  .score-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 10px 0 6px;
  }

  .score-badge {
    background: white;
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 1rem;
    font-weight: 800;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    color: #555;
    border: 2.5px solid #eee;
    transition: transform 0.15s;
  }

  .score-badge span { color: #FF6B6B; }

  #game-area {
    flex: 1;
    width: 100%;
    max-width: 700px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    position: relative;
    gap: 10px;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    z-index: 2;
  }

  .animal-card {
    width: var(--card-size);
    height: var(--card-size);
    border-radius: 24px;
    background: white;
    box-shadow: 0 5px 18px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 3.5px solid #eee;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s, border-color 0.18s;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    font-size: 2.5rem;
    gap: 2px;
  }

  .animal-card .label {
    font-size: 0.72rem;
    font-weight: 800;
    color: #666;
    letter-spacing: 0.3px;
    line-height: 1;
  }

  .animal-card:active {
    transform: scale(0.93);
  }

  .animal-card.selected {
    transform: scale(1.08);
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  }

  .animal-card.matched {
    opacity: 0.55;
    transform: scale(0.95);
    cursor: default;
    pointer-events: none;
  }

  .animal-card.wrong-shake {
    animation: shake 0.4s ease;
  }

  .animal-card.correct-pop {
    animation: pop 0.4s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-6px)}
    80%{transform:translateX(6px)}
  }

  @keyframes pop {
    0%{transform:scale(1)}
    50%{transform:scale(1.2)}
    100%{transform:scale(0.95)}
  }

  /* SVG Canvas for lines */
  #line-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }

  .match-line {
    stroke-width: 7;
    stroke-linecap: round;
    fill: none;
    opacity: 0;
    animation: lineIn 0.35s ease forwards;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
  }

  @keyframes lineIn {
    to { opacity: 1; stroke-dashoffset: 0; }
  }

  .temp-line {
    stroke-width: 7;
    stroke-linecap: round;
    fill: none;
    stroke-dasharray: 12 8;
    opacity: 0.6;
  }

  /* Win screen */
  #win-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    animation: fadeIn 0.5s ease;
  }

  #win-screen.show { display: flex; }

  @keyframes fadeIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

  .win-emoji {
    font-size: 5rem;
    animation: bounce 0.8s infinite alternate cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes bounce {
    from { transform: translateY(0) rotate(-5deg); }
    to   { transform: translateY(-20px) rotate(5deg); }
  }

  .win-title {
    font-size: clamp(2.5rem, 7vw, 4rem);
    font-weight: 800;
    background: linear-gradient(135deg, #FF6B6B, #FFB347, #4ECDC4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1;
  }

  .win-sub {
    font-size: 1.3rem;
    color: #777;
    font-weight: 600;
  }

  .play-again-btn {
    background: linear-gradient(135deg, #FF6B6B, #FFB347);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 40px;
    font-size: 1.4rem;
    font-weight: 800;
    font-family: 'Baloo 2', cursive;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    margin-top: 10px;
  }

  .play-again-btn:active { transform: scale(0.93); }
  .play-again-btn:hover  { transform: scale(1.05); box-shadow: 0 10px 28px rgba(255,107,107,0.45); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    animation: confetti-fall linear forwards;
    z-index: 200;
    pointer-events: none;
  }

  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Stars decoration */
  .deco {
    position: fixed;
    font-size: 1.8rem;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    animation: floatDeco 6s ease-in-out infinite;
  }

  @keyframes floatDeco {
    0%,100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-14px) rotate(8deg)}
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding-bottom: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s, transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }

  .dot.filled {
    transform: scale(1.2);
  }
</style>
</head>
<body>

<!-- Decorations -->
<div class="deco" style="top:5%;left:3%;animation-delay:0s">⭐</div>
<div class="deco" style="top:15%;right:4%;animation-delay:1s">🌟</div>
<div class="deco" style="bottom:10%;left:5%;animation-delay:2s">✨</div>
<div class="deco" style="bottom:5%;right:3%;animation-delay:0.5s">⭐</div>
<div class="deco" style="top:45%;left:1%;animation-delay:3s">🌈</div>

<header>
  <h1>Animal Match! 🐾</h1>
  <p class="subtitle">Draw a line to match each animal!</p>
  <div class="score-bar">
    <div class="score-badge">Matched: <span id="score">0</span>/6</div>
    <div class="score-badge">Tries: <span id="tries">0</span></div>
  </div>
  <div class="progress-dots" id="progress-dots"></div>
</header>

<div id="game-area">
  <svg id="line-canvas"></svg>
  <div class="column" id="left-col"></div>
  <div class="column" id="right-col"></div>
</div>

<!-- Win Screen -->
<div id="win-screen">
  <div class="win-emoji">🎉</div>
  <div class="win-title">You Did It!</div>
  <div class="win-sub" id="win-sub">Amazing matching! 🌟</div>
  <button class="play-again-btn" onclick="initGame()">Play Again! 🐾</button>
</div>

<script>
const ANIMALS = [
  { emoji: '🐶', name: 'Dog' },
  { emoji: '🐱', name: 'Cat' },
  { emoji: '🐸', name: 'Frog' },
  { emoji: '🦁', name: 'Lion' },
  { emoji: '🐘', name: 'Elephant' },
  { emoji: '🦋', name: 'Butterfly' },
];

const PAIR_COLORS = ['#FF6B6B','#FFB347','#4ECDC4','#A78BFA','#34D399','#F472B6'];

let selected = null;
let matchedCount = 0;
let tries = 0;
let tempLine = null;
let gameAnimationId = null;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function initGame() {
  selected = null;
  matchedCount = 0;
  tries = 0;
  updateScore();

  document.getElementById('win-screen').classList.remove('show');
  removeConfetti();

  const leftCol  = document.getElementById('left-col');
  const rightCol = document.getElementById('right-col');
  const svg      = document.getElementById('line-canvas');

  leftCol.innerHTML  = '';
  rightCol.innerHTML = '';
  svg.innerHTML      = '';

  const shuffledLeft  = shuffle(ANIMALS);
  const shuffledRight = shuffle(ANIMALS);

  shuffledLeft.forEach((a, i) => {
    leftCol.appendChild(makeCard(a, 'left', i));
  });

  shuffledRight.forEach((a, i) => {
    rightCol.appendChild(makeCard(a, 'right', i));
  });

  // Progress dots
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  for (let i = 0; i < ANIMALS.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    dots.appendChild(d);
  }

  // Add dashed temp line to svg
  tempLine = document.createElementNS('http://www.w3.org/2000/svg','line');
  tempLine.classList.add('temp-line');
  tempLine.setAttribute('stroke','#aaa');
  tempLine.style.display = 'none';
  svg.appendChild(tempLine);

  // Track mouse/touch for temp line
  const area = document.getElementById('game-area');
  area.onmousemove = area.ontouchmove = (e) => {
    if (!selected) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const rect = area.getBoundingClientRect();
    const x = pt.clientX - rect.left;
    const y = pt.clientY - rect.top;
    if (tempLine.style.display === 'none') return;
    tempLine.setAttribute('x2', x);
    tempLine.setAttribute('y2', y);
  };
}

function makeCard(animal, side, index) {
  const card = document.createElement('div');
  card.className = 'animal-card';
  card.dataset.name = animal.name;
  card.dataset.side = side;
  card.dataset.index = index;
  card.innerHTML = `<span>${animal.emoji}</span><span class="label">${animal.name}</span>`;
  card.addEventListener('pointerdown', onCardTap);
  return card;
}

function getCardCenter(card) {
  const area = document.getElementById('game-area');
  const areaRect = area.getBoundingClientRect();
  const cardRect = card.getBoundingClientRect();
  return {
    x: cardRect.left + cardRect.width / 2 - areaRect.left,
    y: cardRect.top  + cardRect.height / 2 - areaRect.top,
  };
}

function onCardTap(e) {
  e.preventDefault();
  const card = e.currentTarget;
  if (card.classList.contains('matched')) return;

  if (!selected) {
    // First pick
    card.classList.add('selected');
    card.style.borderColor = '#FFB347';
    selected = card;

    // Show temp line from card center
    const center = getCardCenter(card);
    const area = document.getElementById('game-area');
    const areaRect = area.getBoundingClientRect();
    tempLine.setAttribute('x1', center.x);
    tempLine.setAttribute('y1', center.y);
    tempLine.setAttribute('x2', center.x);
    tempLine.setAttribute('y2', center.y);
    tempLine.style.display = '';

  } else {
    // Second pick
    tries++;
    updateScore();
    tempLine.style.display = 'none';

    const first  = selected;
    const second = card;

    first.classList.remove('selected');
    first.style.borderColor = '';

    if (first === second) {
      selected = null;
      return;
    }

    const sameSide  = first.dataset.side === second.dataset.side;
    const sameAnimal = first.dataset.name === second.dataset.name;

    if (!sameSide && sameAnimal) {
      // Correct match!
      const colorIndex = matchedCount % PAIR_COLORS.length;
      const color = PAIR_COLORS[colorIndex];

      first.style.borderColor  = color;
      second.style.borderColor = color;
      first.classList.add('matched');
      second.classList.add('matched');
      first.classList.add('correct-pop');
      second.classList.add('correct-pop');

      drawLine(first, second, color);
      matchedCount++;

      // Fill progress dot
      const dot = document.getElementById(`dot-${matchedCount - 1}`);
      if (dot) {
        dot.style.background = color;
        dot.classList.add('filled');
      }

      updateScore();
      selected = null;

      if (matchedCount === ANIMALS.length) {
        setTimeout(showWin, 600);
      }

    } else {
      // Wrong!
      first.classList.add('wrong-shake');
      second.classList.add('wrong-shake');
      first.style.borderColor  = '#FF6B6B';
      second.style.borderColor = '#FF6B6B';
      setTimeout(() => {
        first.classList.remove('wrong-shake');
        second.classList.remove('wrong-shake');
        first.style.borderColor  = '';
        second.style.borderColor = '';
      }, 500);
      selected = null;
    }
  }
}

function drawLine(cardA, cardB, color) {
  const svg  = document.getElementById('line-canvas');
  const ptA  = getCardCenter(cardA);
  const ptB  = getCardCenter(cardB);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.classList.add('match-line');
  line.setAttribute('x1', ptA.x);
  line.setAttribute('y1', ptA.y);
  line.setAttribute('x2', ptB.x);
  line.setAttribute('y2', ptB.y);
  line.setAttribute('stroke', color);
  svg.insertBefore(line, tempLine);
}

function updateScore() {
  document.getElementById('score').textContent = matchedCount;
  document.getElementById('tries').textContent  = tries;
}

function showWin() {
  const ws = document.getElementById('win-screen');
  ws.classList.add('show');

  const msgs = [
    "You're a matching superstar! 🌟",
    "Amazing job, animal expert! 🦁",
    "Perfect! You know your animals! 🐾",
    "Incredible matching skills! 🎊",
  ];
  document.getElementById('win-sub').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  launchConfetti();
}

function launchConfetti() {
  const colors = ['#FF6B6B','#FFB347','#4ECDC4','#A78BFA','#34D399','#F472B6','#60A5FA','#FBBF24'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        top:-20px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'3px'};
        width:${8+Math.random()*12}px;
        height:${8+Math.random()*12}px;
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*0.3}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 25);
  }
}

function removeConfetti() {
  document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
}

// Redraw lines on resize (orientation change)
window.addEventListener('resize', () => {
  // Re-init to recalculate positions cleanly
  // Small debounce
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(initGame, 250);
});

initGame();
</script>
</body>
</html>
